name: Deploy to VPS

on:
  push:
    branches: [jeff-main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Trust VPS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" bash -se <<'REMOTE'
          set -euo pipefail
          cd "$DEPLOY_PATH"

          echo "::group::Fetching latest jeff-main"
          git fetch origin
          git reset --hard origin/jeff-main
          echo "::endgroup::"

          echo "::group::Building & restarting containers"
          docker compose -f docker-compose.prod.yml pull postgres || true
          docker compose -f docker-compose.prod.yml up -d --build
          echo "::endgroup::"

          echo "::group::Waiting for web container to become healthy"
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.prod.yml ps web --format json | grep -q '"State":"running"'; then
              echo "web is running"
              break
            fi
            sleep 2
          done
          echo "::endgroup::"

          echo "::group::Cleaning dangling images"
          docker image prune -f
          echo "::endgroup::"
          REMOTE

      - name: Smoke test
        env:
          PROD_URL: ${{ secrets.PROD_URL }}
        run: |
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL/login" || echo "000")
            echo "Attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 5
          done
          echo "Smoke test failed: $PROD_URL/login did not return 200" >&2
          exit 1
